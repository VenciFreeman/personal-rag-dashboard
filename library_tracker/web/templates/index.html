<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>Library Tracker</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/static/favicon_logosc/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon_logosc/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon_logosc/favicon-16x16.png" />
  <link rel="shortcut icon" href="/static/favicon_logosc/favicon.ico" />
  <link rel="manifest" href="/static/favicon_logosc/site.webmanifest" />
  <link rel="stylesheet" href="/static/app.css?v={{ local_asset_version }}" />
  <link rel="stylesheet" href="/core-static/sidebar_shared.css?v=20260326a" />
  <link rel="stylesheet" href="/core-static/analysis_shared.css?v=20260323e" />
  <link rel="stylesheet" href="/core-static/markdown_shared.css?v=20260322b" />
</head>
<body>
  <header class="top">
    <h1>Library Tracker</h1>
  </header>

  <main class="shell">
    <nav class="tabs" role="tablist" aria-label="Library tabs">
      <button class="tab active" id="tab-query" data-tab="query" role="tab" aria-selected="true">查询</button>
      <button class="tab" id="tab-stats" data-tab="stats" role="tab" aria-selected="false">统计</button>
      <button class="tab" id="tab-analysis" data-tab="analysis" role="tab" aria-selected="false">分析报告</button>
    </nav>

    <section id="panel-query" class="panel tab-panel active" role="tabpanel" aria-labelledby="tab-query">
      <div class="query-layout" id="query-workspace">
        <aside class="sidebar" id="filter-sidebar">
          <div class="sidebar-head">
            <strong>筛选标签</strong>
          </div>
          <button id="btn-add" class="full">新增</button>
          <div class="filter-group">
            <label>Year</label>
            <select id="filter-year-select" class="filter-select">
              <option value="">全部年份</option>
            </select>
          </div>
          <div class="filter-group">
            <label>Rating</label>
            <select id="filter-rating-select" class="filter-select">
              <option value="">全部评分</option>
            </select>
          </div>
          <div class="filter-group">
            <label>Media Type</label>
            <div id="filter-media_type" class="chips"></div>
          </div>
          <div class="filter-group">
            <label>Nationality</label>
            <div id="filter-nationality" class="chips"></div>
          </div>
          <div class="filter-group">
            <label>Category</label>
            <div id="filter-category" class="chips"></div>
          </div>
          <div class="filter-group">
            <label>Channel</label>
            <div id="filter-channel" class="chips"></div>
          </div>
        </aside>

        <div class="main-panel">
          <h2>查询输入</h2>
          <div class="search-row">
            <input id="query-input" placeholder="输入关键词，或用于向量语义搜索" autocomplete="off" spellcheck="false" />
            <button id="btn-keyword">关键词</button>
            <button id="btn-vector">向量</button>
            <button id="btn-refresh-embedding" class="ghost" title="仅刷新 embedding_status=0 的条目">刷新</button>
          </div>
          <div id="result-meta" class="hint"></div>
          <div id="result-list" class="result-list"></div>
          <div id="result-pagination" class="result-pagination hidden" aria-label="查询结果分页">
            <button id="result-page-first" type="button" class="ghost result-page-btn" aria-label="首页">&lt;&lt;</button>
            <button id="result-page-prev" type="button" class="ghost result-page-btn" aria-label="上一页">&lt;</button>
            <div id="result-page-info" class="hint result-page-info">1 / 1</div>
            <button id="result-page-next" type="button" class="ghost result-page-btn" aria-label="下一页">&gt;</button>
            <button id="result-page-last" type="button" class="ghost result-page-btn" aria-label="末页">&gt;&gt;</button>
          </div>
        </div>
      </div>
    </section>

    <section id="panel-stats" class="panel tab-panel" role="tabpanel" aria-labelledby="tab-stats">
      <div class="stats-layout">
        <div class="stats-toolbar">
          <label>维度
            <select id="stats-field"></select>
          </label>
          <label>年份筛选
            <select id="stats-year"></select>
          </label>
          <button id="stats-refresh" class="ghost">刷新统计</button>
        </div>

        <div class="stats-table-wrap">
          <table class="stats-table" id="stats-overview-table"></table>
        </div>

        <div class="chart-grid-4 stats-chart-grid">
          <div class="chart-box overview-chart-card">
            <div class="chart-title">Book</div>
            <div id="stats-chart-book" class="chart-host"></div>
          </div>
          <div class="chart-box overview-chart-card">
            <div class="chart-title">Video</div>
            <div id="stats-chart-video" class="chart-host"></div>
          </div>
          <div class="chart-box overview-chart-card">
            <div class="chart-title">Music</div>
            <div id="stats-chart-music" class="chart-host"></div>
          </div>
          <div class="chart-box overview-chart-card">
            <div class="chart-title">Game</div>
            <div id="stats-chart-game" class="chart-host"></div>
          </div>
        </div>

        <div class="chart-box-full stats-chart-panel">
          <div class="chart-title">记录总量走势</div>
          <div id="stats-chart-area" class="chart-host chart-host-large"></div>
        </div>

        <div class="chart-box-full stats-chart-panel">
          <div class="chart-title">维度标签走势</div>
          <div class="component-selector">
            <label for="stats-trend-label">媒介</label>
            <select id="stats-trend-label"></select>
          </div>
          <div id="stats-chart-trend" class="chart-host chart-host-large"></div>
        </div>
      </div>
    </section>

    <section id="panel-analysis" class="tab-panel" role="tabpanel" aria-labelledby="tab-analysis">
      <div class="workspace analysis-workspace" id="analysis-shell">
        <aside class="sidebar analysis-sidebar" id="analysis-sidebar">
          <div class="sidebar-head">
            <strong>分析报告</strong>
            <button id="btn-analysis-sidebar-toggle" class="sidebar-toggle ghost" type="button" title="收起或展开侧栏">&lt;</button>
          </div>
          <div class="sidebar-body">
            <div class="analysis-side-tabs" role="tablist">
              <button class="analysis-side-tab active" type="button" data-analysis-view="quarterly" aria-selected="true">季度报告</button>
              <button class="analysis-side-tab" type="button" data-analysis-view="yearly" aria-selected="false">年度报告</button>
            </div>
            <div class="analysis-sidebar-section-title" id="analysis-sidebar-section-title">报告目录</div>
            <ul class="list analysis-report-list" id="analysis-sidebar-report-list"></ul>
          </div>
        </aside>

        <div class="main-panel analysis-main">
          <section class="analysis-view active" id="analysis-quarterly-view">
            <div class="analysis-toolbar-row">
              <label class="analysis-select-field" for="analysis-quarterly-period-select">
                <span>季度</span>
                <select id="analysis-quarterly-period-select"></select>
              </label>
              <div class="analysis-toolbar-actions">
                <button id="btn-analysis-quarterly-local" class="accent-btn" type="button">本地生成</button>
                <button id="btn-analysis-quarterly-deepseek" class="primary" type="button">DeepSeek</button>
              </div>
            </div>
            <div class="analysis-meta-row" id="analysis-quarterly-meta"></div>
            <article id="analysis-quarterly-doc" class="analysis-doc markdown-body"></article>
          </section>

          <section class="analysis-view" id="analysis-yearly-view">
            <div class="analysis-toolbar-row">
              <label class="analysis-select-field" for="analysis-yearly-period-select">
                <span>年份</span>
                <select id="analysis-yearly-period-select"></select>
              </label>
              <div class="analysis-toolbar-actions">
                <button id="btn-analysis-yearly-local" class="accent-btn" type="button">本地生成</button>
                <button id="btn-analysis-yearly-deepseek" class="primary" type="button">DeepSeek</button>
              </div>
            </div>
            <div class="analysis-meta-row" id="analysis-yearly-meta"></div>
            <article id="analysis-yearly-doc" class="analysis-doc markdown-body"></article>
          </section>
        </div>
      </div>
    </section>
  </main>

  <div id="preview-modal" class="preview-modal hidden" aria-hidden="true">
    <div class="preview-modal-backdrop" data-role="backdrop"></div>
    <div class="preview-modal-panel" role="dialog" aria-modal="true" aria-label="条目预览">
      <button id="preview-close-btn" class="preview-close-btn ghost" title="关闭">✕</button>
      <div id="preview-card" class="doc preview-card">
        <div class="preview-empty">请选择一条结果进行预览...</div>
      </div>
    </div>
  </div>

  <dialog id="item-dialog">
    <form method="dialog" id="item-form">
      <div class="dialog-head">
        <h3 id="dialog-title">新增条目</h3>
        <div class="row end dialog-actions">
          <button id="btn-delete" class="dialog-action-btn btn-danger ghost hidden" type="button" value="delete">删除</button>
          <button id="btn-save" class="dialog-action-btn" type="submit" value="save">保存</button>
          <button id="btn-cancel" class="dialog-action-btn ghost" type="button" value="cancel">取消</button>
        </div>
      </div>
      <div class="form-grid">
        <label>Title * <input name="title" required /></label>
        <label class="mobile-half">Date
          <input name="date" type="date" />
        </label>
        <label class="mobile-half">Media Type *
          <select name="media_type" required>
            <option value="book">Book</option>
            <option value="video">Video</option>
            <option value="music">Music</option>
            <option value="game">Game</option>
          </select>
        </label>
        <label class="mobile-half">Author <input name="author" /></label>
        <label class="mobile-half">Nationality <input name="nationality" /></label>
        <label class="mobile-half">Category <input name="category" /></label>
        <label class="mobile-half">Channel <input name="channel" /></label>
        <label class="mobile-half">Publisher <input name="publisher" /></label>
        <label class="mobile-half">封面图片
          <div class="cover-upload-zone" id="cover-upload-zone" tabindex="0">
            <input name="cover_file" type="file" accept="image/*" id="cover-file-input" class="cover-file-input" />
            <div class="cover-upload-actions">
              <button type="button" class="ghost cover-upload-btn" id="cover-select-btn">选择图片</button>
              <div class="cover-upload-hint">拖拽图片 / Ctrl+V 粘贴</div>
            </div>
          </div>
        </label>
        <label class="rating-field">Rating
          <input name="rating" id="rating-input" type="hidden" />
          <div id="rating-stars" class="rating-stars" role="slider" aria-label="评分" aria-valuemin="0" aria-valuemax="10" aria-valuenow="0" tabindex="0">
            <span class="stars-base">★★★★★</span>
            <span class="stars-fill" id="rating-stars-fill">★★★★★</span>
          </div>
          <div id="rating-text" class="rating-text">未评分</div>
        </label>
        <label class="span2">URL <input name="url" /></label>
        <label class="span2">Review <textarea name="review"></textarea></label>
      </div>
    </form>
  </dialog>

  <dialog id="delete-confirm-dialog" aria-labelledby="delete-confirm-title">
    <div class="dialog-head">
      <h3 id="delete-confirm-title">确认删除</h3>
    </div>
    <div class="dialog-body">
      <p id="delete-confirm-msg">删除后无法恢复，同时会清除关联的向量和图谱节点。请确认是否继续。</p>
    </div>
    <div class="dialog-foot">
      <button type="button" id="delete-confirm-ok" class="dialog-action-btn btn-danger">删除</button>
      <button type="button" id="delete-confirm-cancel" class="dialog-action-btn ghost">取消</button>
    </div>
  </dialog>

  <div id="analysis-context-menu" class="analysis-context-menu hidden" role="menu" aria-hidden="true">
    <button id="btn-analysis-open-report-location" class="analysis-context-menu-item" type="button" role="menuitem">打开报告所在位置</button>
    <button id="btn-analysis-delete-report" class="analysis-context-menu-item" type="button" role="menuitem">删除报告</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <script src="/core-static/markdown.js?v=20260403a"></script>
  <script src="/core-static/ui_bootstrap.js?v=20260326c"></script>
  <script src="/core-static/app_shell.js?v=20260326c"></script>
  <script src="/core-static/report_shell.js?v=20260326b"></script>
  <script src="/static/modules/query_workspace.js?v={{ local_asset_version }}"></script>
  <script src="/static/modules/editor.js?v={{ local_asset_version }}"></script>
  <script src="/static/modules/stats.js?v={{ local_asset_version }}"></script>
  <script src="/static/app.js?v={{ local_asset_version }}"></script>
  <script src="/static/analysis.js?v={{ local_asset_version }}"></script>
</body>
</html>
